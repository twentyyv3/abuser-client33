<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABUSER CLIENT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Share Tech Mono', monospace;
    background: url('back.gif') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

/* Header */
header {
    width: 100%;
    padding: 20px 40px;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    gap: 15px;
    box-shadow: 0 4px 15px rgba(255,0,0,0.5);
}

header img {
    height: 50px;
    width: 50px;
}

header h1 {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    font-size: 24px;
    color: #ff0000;
    letter-spacing: 2px;
}

/* Main container */
.container {
    width: 90%;
    max-width: 720px;
    margin-top: 60px;
    display: flex;
    flex-direction: column;
    gap: 25px;
}

/* MakeCode link box */
.link-box {
    display: flex;
    align-items: center;
    background: rgba(0,0,0,0.7);
    border: 2px solid #ff0000;
    border-radius: 12px;
    padding: 14px;
    transition: all 0.25s ease;
}

.link-box:hover {
    box-shadow: 0 0 20px rgba(255,0,0,0.6);
    transform: translateY(-2px);
}

.link-box input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    outline: none;
    color: #fff;
}

.link-box button {
    background: #ff0000;
    border: none;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-family: 'Press Start 2P', cursive;
    transition: all 0.25s ease;
    margin-left: 15px;
}

.link-box button:hover {
    background: #000;
    color: #ff0000;
    box-shadow: 0 0 18px #ff0000;
}

/* Tutorial box */
.tutorial {
    padding: 16px;
    background: rgba(0,0,0,0.8);
    border-left: 4px solid #ff0000;
    border-radius: 10px;
    font-size: 14px;
    color: #ff0000;
    text-align: center;
    font-weight: bold;
    box-shadow: 0 0 15px rgba(255,0,0,0.4);
    font-family: 'Press Start 2P', cursive;
}

/* Video */
video {
    width: 100%;
    border: 2px solid #ff0000;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(255,0,0,0.5);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

video:hover {
    transform: scale(1.02);
    box-shadow: 0 0 35px rgba(255,0,0,0.6);
}

/* Footer */
footer {
    margin-top: auto;
    padding: 25px;
    font-size: 12px;
    color: #ff0000;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
}

/* Responsive improvements */
@media (max-width: 500px) {
    header h1 {
        font-size: 18px;
    }

    .link-box input {
        font-size: 12px;
    }

    .tutorial {
        font-size: 12px;
    }
}
</style>
</head>
<body>

<header>
    <img src="tntlogo.webp" alt="Logo">
    <h1>ABUSER CLIENT</h1>
</header>

<div class="container">

    <div class="link-box">
        <input type="text" id="codeBox" value="https://makecode.com/_Xdi51K0eLfuE" readonly>
        <button onclick="copyLink()">COPY</button>
    </div>

    <div class="tutorial">once you copied the makecode link go load into a 
        minecraft education world it can be any gamemode or difficulty. when you boot up press C in the world and
        watch the video to continue</div>

    <video src="tutorial.mp4" controls></video>

</div>

<footer>
    © 2026 ABUSER CLIENT - DEVELOPED BY RILEY/TWENTY RIGHTS DESERVED
</footer>

<script>
function copyLink() {
    const copyText = document.getElementById("codeBox");
    copyText.select();
    copyText.setSelectionRange(0, 99999);
    document.execCommand("copy");
    alert("MakeCode link copied!");
}

document.addEventListener('keydown', function(event) {
    if(event.key.toLowerCase() === 'c') {
        alert("You pressed C in a world!");
    }
});
</script>

</body>
</html>
