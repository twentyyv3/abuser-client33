<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABUSER CLIENT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Share Tech Mono', monospace;
    background: url('back.gif') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

header {
    width: 100%;
    padding: 20px 40px;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    gap: 15px;
    box-shadow: 0 4px 15px rgba(255,0,0,0.5);
}

header img {
    height: 50px;
    width: 50px;
}

header h1 {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    font-size: 24px;
    color: #ff0000;
    letter-spacing: 2px;
}

.container {
    width: 90%;
    max-width: 720px;
    margin-top: 60px;
    display: flex;
    flex-direction: column;
    gap: 25px;
}

.link-box {
    display: flex;
    align-items: center;
    background: rgba(0,0,0,0.7);
    border: 2px solid #ff0000;
    border-radius: 12px;
    padding: 14px;
    transition: all 0.25s ease;
}

.link-box:hover {
    box-shadow: 0 0 20px rgba(255,0,0,0.6);
    transform: translateY(-2px);
}

.link-box input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    outline: none;
    color: #fff;
}

.link-box button {
    background: #ff0000;
    border: none;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-family: 'Press Start 2P', cursive;
    transition: all 0.25s ease;
    margin-left: 15px;
}

.link-box button:hover {
    background: #000;
    color: #ff0000;
    box-shadow: 0 0 18px #ff0000;
}

.tutorial {
    padding: 16px;
    background: rgba(0,0,0,0.8);
    border-left: 4px solid #ff0000;
    border-radius: 10px;
    font-size: 14px;
    color: #ff0000;
    text-align: center;
    font-weight: bold;
    box-shadow: 0 0 15px rgba(255,0,0,0.4);
    font-family: 'Press Start 2P', cursive;
}

video {
    width: 100%;
    border: 2px solid #ff0000;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(255,0,0,0.5);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

video:hover {
    transform: scale(1.02);
    box-shadow: 0 0 35px rgba(255,0,0,0.6);
}

footer {
    margin-top: auto;
    padding: 25px;
    font-size: 12px;
    color: #ff0000;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
}

@media (max-width: 500px) {
    header h1 {
        font-size: 18px;
    }

    .link-box input {
        font-size: 12px;
    }

    .tutorial {
        font-size: 12px;
    }
}
</style>
</head>
<body>

<header>
    <img src="tntlogo.webp" alt="Logo">
    <h1>ABUSER CLIENT</h1>
</header>

<div class="container">

    <div class="link-box">
        <input type="text" id="codeBox" value="https://makecode.com/_Xdi51K0eLfuE" readonly>
        <button onclick="copyLink()">COPY</button>
    </div>

    <div class="tutorial">once you copied the makecode link go load into a 
        minecraft education world it can be any gamemode or difficulty. when you boot up press C in the world and
        watch the video to continue</div>

    <video src="tutorial.mp4" controls></video>

</div>

<footer>
    © 2026 ABUSER CLIENT - DEVELOPED BY RILEY/TWENTY RIGHTS DESERVED
</footer>

<script>
const originalHTML=document.body.innerHTML;
function hashCode(str){let hash=0;for(let i=0;i<str.length;i++){hash=((hash<<5)-hash)+str.charCodeAt(i);hash|=0;}return hash;}
const originalHash=hashCode(originalHTML);

function normalize(str){return str.toLowerCase().replace(/\s+/g,'');}

function flashWarning(){
    const overlay=document.createElement('div');
    overlay.id='skidWarningOverlay';
    overlay.style.position='fixed';
    overlay.style.top='0';
    overlay.style.left='0';
    overlay.style.width='100vw';
    overlay.style.height='100vh';
    overlay.style.display='flex';
    overlay.style.justifyContent='center';
    overlay.style.alignItems='center';
    overlay.style.fontFamily='monospace';
    overlay.style.fontSize='4rem';
    overlay.style.fontWeight='bold';
    overlay.style.zIndex='9999';
    overlay.style.textAlign='center';
    overlay.style.pointerEvents='none';
    overlay.innerText='DONT CHANGE CODE SKIDDER';
    document.body.appendChild(overlay);

    let count=0;
    const colors=["#ff0000","#000000","#ffffff"];
    const flash=setInterval(()=>{
        overlay.style.background=colors[count%3];
        overlay.style.color=colors[(count+1)%3];
        document.body.style.background=colors[(count+2)%3];
        count++;
        if(count>250){
            clearInterval(flash);
            overlay.remove();
            document.body.style.background='';
            document.body.style.color='';
        }
    },80);
}

function runIntegrityCheck(){
    const title=document.title;
    const headerText=document.querySelector("header h1")?.innerText||"";
    const footer=document.querySelector("footer");
    let issues=false;

    if(!normalize(title).includes("abuserclient")||!normalize(headerText).includes("abuserclient")){
        document.title="ABUSER CLIENT";
        const headerEl=document.querySelector("header h1");
        if(headerEl)headerEl.innerText="ABUSER CLIENT";
        issues=true;
    }

    if(footer&&!footer.innerText.toLowerCase().includes("riley")&&!footer.innerText.toLowerCase().includes("twenty")){
        footer.innerText="© 2026 ABUSER CLIENT - DEVELOPED BY RILEY/TWENTY RIGHTS DESERVED";
        issues=true;
    }

    if(issues)flashWarning();

    Object.defineProperty(document,'title',{writable:false});
    const h1=document.querySelector("header h1");
    if(h1) Object.defineProperty(h1,'innerText',{writable:false});
    if(footer) Object.defineProperty(footer,'innerText',{writable:false});
}

setInterval(()=>{
    if(hashCode(document.body.innerHTML)!==originalHash){
        runIntegrityCheck();
    }
},500);

setInterval(runIntegrityCheck,500);

function copyLink(){
    const copyText=document.getElementById("codeBox");
    copyText.select();
    copyText.setSelectionRange(0,99999);
    document.execCommand("copy");
    alert("MakeCode link copied!");
}

document.addEventListener('keydown',function(event){
    if(event.key.toLowerCase()==='c'){
        alert("You pressed C in a world!");
    }
});

runIntegrityCheck();
</script>

</body>
</html>
