<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABUSER CLIENT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Roboto Mono', monospace;
    background: #fff;
    color: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

/* Top bar */
header {
    width: 100%;
    padding: 20px 40px;
    background: #ff0000;
    display: flex;
    align-items: center;
    gap: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.15);
}

header img {
    height: 50px;
    width: 50px;
}

header h1 {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    color: #fff;
    letter-spacing: 1.5px;
}

/* Main container */
.container {
    width: 90%;
    max-width: 720px;
    margin-top: 60px;
    display: flex;
    flex-direction: column;
    gap: 50px;
    position: relative;
}

/* Decorative shapes */
.container::before {
    content: '';
    position: absolute;
    top: -50px;
    left: -50px;
    width: 100px;
    height: 100px;
    background: #ff0000;
    border-radius: 20px;
    opacity: 0.15;
}

.container::after {
    content: '';
    position: absolute;
    bottom: -60px;
    right: -60px;
    width: 120px;
    height: 120px;
    background: #ff0000;
    border-radius: 50%;
    opacity: 0.12;
}

/* Link box */
.link-box {
    display: flex;
    align-items: center;
    background: #f9f9f9;
    border: 2px solid #ff0000;
    border-radius: 12px;
    padding: 14px;
    transition: all 0.25s ease;
}

.link-box:hover {
    box-shadow: 0 0 18px rgba(255,0,0,0.3);
    transform: translateY(-2px);
}

.link-box input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Roboto Mono', monospace;
    font-size: 16px;
    outline: none;
    color: #111;
}

.link-box button {
    background: #ff0000;
    border: none;
    color: #fff;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-family: 'Orbitron', sans-serif;
    transition: all 0.25s ease;
    margin-left: 15px;
}

.link-box button:hover {
    background: #fff;
    color: #ff0000;
    box-shadow: 0 0 15px #ff0000;
}

/* Video */
video {
    width: 100%;
    border: 2px solid #ff0000;
    border-radius: 12px;
    box-shadow: 0 0 12px rgba(255,0,0,0.3);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

video:hover {
    transform: scale(1.02);
    box-shadow: 0 0 25px rgba(255,0,0,0.35);
}

/* Footer */
footer {
    margin-top: auto;
    padding: 25px;
    font-size: 12px;
    color: #ff0000;
    text-align: center;
}
</style>
</head>
<body>

<header>
    <img src="tntlogo.webp" alt="Logo">
    <h1>ABUSER CLIENT</h1>
</header>

<div class="container">
    <div class="link-box">
        <input type="text" id="codeBox" value="https://makecode.com/_Xdi51K0eLfuE" readonly>
        <button onclick="copyLink()">COPY</button>
    </div>

    <video src="tutorial.mp4" controls></video>
</div>

<footer>
    © 2026 ABUSER CLIENT
</footer>

<script>
function copyLink() {
    const copyText = document.getElementById("codeBox");
    copyText.select();
    copyText.setSelectionRange(0, 99999);
    document.execCommand("copy");
    alert("MakeCode link copied!");
}
</script>

</body>
</html>
