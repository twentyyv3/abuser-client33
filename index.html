<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABUSER CLIENT</title>
<!-- Pixel font -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

/* Header */
header {
    width: 100%;
    padding: 60px 20px 40px;
    text-align: center;
    background: #100000;
    border-bottom: 2px solid #ff0000;
}

h1 {
    margin: 0;
    font-size: 32px;
    color: #ff0000;
    letter-spacing: 2px;
    animation: glowText 2s ease-in-out infinite alternate;
}

@keyframes glowText {
    0% { text-shadow: 0 0 2px #ff0000; }
    100% { text-shadow: 0 0 12px #ff0000; }
}

/* Container */
.container {
    margin-top: 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    width: 90%;
    max-width: 600px;
}

/* Link box */
.link-box {
    display: flex;
    align-items: center;
    background: #100000;
    border: 2px solid #ff0000;
    border-radius: 6px;
    padding: 10px;
    width: 100%;
    transition: 0.3s;
}

.link-box:hover {
    box-shadow: 0 0 15px #ff0000;
    transform: scale(1.02);
}

.link-box input {
    flex: 1;
    background: transparent;
    border: none;
    color: #fff;
    font-family: 'Press Start 2P', cursive;
    font-size: 12px;
    outline: none;
    animation: blinkCaret 1s step-start infinite;
}

@keyframes blinkCaret {
    50% { border-right: 2px solid #ff0000; }
}

/* Copy button */
.link-box button {
    background: #ff0000;
    border: none;
    color: #fff;
    padding: 8px 15px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-family: 'Press Start 2P', cursive;
    transition: 0.3s;
    margin-left: 10px;
    animation: pulseButton 2s infinite;
}

.link-box button:hover {
    background: #fff;
    color: #ff0000;
    box-shadow: 0 0 10px #ff0000;
}

@keyframes pulseButton {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

/* Video iframe */
iframe {
    width: 100%;
    height: 300px;
    border: 2px solid #ff0000;
    border-radius: 6px;
    margin-top: 10px;
    transition: transform 0.3s, box-shadow 0.3s;
}

iframe:hover {
    transform: scale(1.02);
    box-shadow: 0 0 15px #ff0000;
}

/* Footer */
footer {
    margin-top: auto;
    padding: 20px;
    font-size: 10px;
    color: #ff4444;
    text-align: center;
}

/* Subtle background animation */
body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
        45deg,
        rgba(255,0,0,0.03) 0px,
        rgba(255,0,0,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events: none;
    animation: moveBG 15s linear infinite;
}

@keyframes moveBG {
    0% {background-position: 0 0;}
    100% {background-position: 100px 100px;}
}
</style>
</head>
<body>

<header>
    <h1>ABUSER CLIENT</h1>
</header>

<div class="container">

    <!-- Copy Link -->
    <div class="link-box">
        <input type="text" id="codeBox" value="https://makecode.com/_Xdi51K0eLfuE" readonly>
        <button onclick="copyLink()">COPY</button>
    </div>

    <!-- Video Section -->
    <iframe src=""></iframe>

</div>

<footer>
    © 2026 ABUSER CLIENT
</footer>

<script>
function copyLink() {
    const copyText = document.getElementById("codeBox");
    copyText.select();
    copyText.setSelectionRange(0, 99999);
    document.execCommand("copy");
    alert("Link copied!");
}
</script>

</body>
</html>
