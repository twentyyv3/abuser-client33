<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABUSER CLIENT</title>
<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #050000;
    color: #eee;
}

header {
    padding: 60px 20px 30px;
    text-align: center;
    background: radial-gradient(circle at top, #2a0000, #050000);
}

h1 {
    margin: 0;
    font-size: 52px;
    color: #ff2b2b;
    letter-spacing: 3px;
}

header p {
    color: #aa4444;
    margin-top: 8px;
    font-size: 14px;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 30px 20px 60px;
}

.section {
    margin-bottom: 40px;
}

.box {
    background: #0f0000;
    border: 1px solid #3a0000;
    padding: 18px 20px;
    border-radius: 8px;
}

h2 {
    color: #ff3a3a;
    margin-bottom: 10px;
    font-size: 20px;
}

p {
    color: #cc7777;
    font-size: 14px;
    line-height: 1.6;
}

.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 20px;
    background: #ff2b2b;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
    border: none;
}

.btn:hover {
    background: #ff0000;
    box-shadow: 0 0 8px rgba(255,0,0,0.6);
}

textarea {
    width: 100%;
    height: 100px;
    background: #080000;
    color: #ff6666;
    border: 1px solid #330000;
    border-radius: 6px;
    padding: 10px;
    resize: none;
    font-family: monospace;
}

iframe {
    width: 100%;
    height: 360px;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
}

footer {
    text-align: center;
    font-size: 12px;
    color: #441111;
    margin-top: 40px;
}
</style>
</head>
<body>

<header>
    <h1>ABUSER CLIENT</h1>
    <p>copy the MakeCode link below to use it</p>
</header>

<div class="container">

    <!-- Copy Link Section -->
    <div class="section">
        <div class="box">
            <h2>Copy MakeCode Link</h2>
            <p>Click the button to copy the project link:</p>
            <textarea id="codeBox" readonly>https://makecode.com/_Xdi51K0eLfuE</textarea>
            <br>
            <button class="btn" onclick="copyLink()">Copy Link</button>
        </div>
    </div>

    <!-- Video Section -->
    <div class="section">
        <div class="box">
            <h2>Video Tutorial</h2>
            <p>Watch how to use ABUSER CLIENT:</p>
            <iframe src=""></iframe>
        </div>
    </div>

</div>

<footer>
    ABUSER CLIENT © 2026
</footer>

<script>
function copyLink() {
    var copyText = document.getElementById("codeBox");
    copyText.select();
    copyText.setSelectionRange(0, 99999);
    document.execCommand("copy");
    alert("MakeCode link copied!");
}
</script>

</body>
</html>
